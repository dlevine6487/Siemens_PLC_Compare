<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siemens PLC Code Viewer PoC</title>
    <style>
        :root {
            --tia-bg: #EBEBEB;
            --tia-grid-bg: #FFFFFF;
            --tia-blue: #007ACC;
            --tia-green: #008800;
            --tia-orange: #FF8C00;
            --tia-purple: #6A0DAD;
            --tia-gray: #555555;
            --tia-light-gray: #D4D4D4;
            --power-rail-color: #000000;
            --wire-color: #000000;
            --wire-thickness: 2px;
            --font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        }
        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 16px;
            background-color: var(--tia-bg);
            color: #333;
        }
        .container {
            max-width: 1600px;
            margin: auto;
            background-color: var(--tia-grid-bg);
            border: 1px solid var(--tia-light-gray);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .block-header {
            background-color: #F7F7F7;
            border-bottom: 1px solid var(--tia-light-gray);
            padding: 8px 16px;
            font-size: 1.1em;
            font-weight: 600;
        }
        .block-header span {
            font-weight: 400;
            color: var(--tia-gray);
        }
        #interface-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        #interface-table th, #interface-table td {
            border-bottom: 1px solid #E0E0E0;
            padding: 8px 16px;
            text-align: left;
            white-space: nowrap;
        }
        #interface-table th {
            background-color: #F7F7F7;
            font-weight: 600;
        }
        #interface-table .section-header td {
            background-color: #E6F2FA;
            color: var(--tia-blue);
            font-weight: bold;
        }
        #interface-table .datatype { color: var(--tia-purple); }
        #interface-table .comment { color: var(--tia-green); font-style: italic; }

        .networks-container {
            padding: 16px;
            overflow-x: auto;
        }
        .network {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--tia-light-gray);
        }
        .network-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .network-comment {
            font-style: italic;
            color: var(--tia-green);
            margin-bottom: 12px;
        }
        .svg-canvas {
            background-color: var(--tia-grid-bg);
            min-width: 800px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="block-header">
        FB1 <span>Main_Block</span>
    </div>
    <table id="interface-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Data Type</th>
                <th>Comment</th>
            </tr>
        </thead>
        <tbody>
            <!-- JS will populate this -->
        </tbody>
    </table>
    <div class="networks-container">
        <div id="network-1" class="network">
             <div class="network-title">Network 1: Start Conditions</div>
             <div class="network-comment">// Motor start logic based on system readiness and manual start command.</div>
             <svg id="svg-network-1" class="svg-canvas" width="800" height="200"></svg>
        </div>
    </div>

<script>
const boilerAlarmXml = `<?xml version="1.0" encoding="utf-8"?>
<Document>
  <Engineering version="V19" />
  <SW.Blocks.FB ID="0">
    <AttributeList>
      <Interface><Sections xmlns="http://www.siemens.com/automation/Openness/SW/Interface/v5">
  <Section Name="Input">
    <Member Name="Alarm Bit" Datatype="Bool" />
  </Section>
  <Section Name="Output" />
  <Section Name="InOut" />
  <Section Name="Static">
    <Member Name="Boiler" Datatype="Program_Alarm" Version="1.0" />
  </Section>
  <Section Name="Temp">
    <Member Name="Return" Datatype="Int" />
    <Member Name="Current Time" Datatype="DTL" Version="1.0" />
    <Member Name="Boiler_Error" Datatype="Bool" />
    <Member Name="Boiler_Status" Datatype="Word" />
  </Section>
  <Section Name="Constant" />
</Sections></Interface>
      <MemoryLayout>Optimized</MemoryLayout>
      <Name>BoilerAlarm</Name>
      <Number>2</Number>
      <ProgrammingLanguage>LAD</ProgrammingLanguage>
    </AttributeList>
    <ObjectList>
      <SW.Blocks.CompileUnit ID="3" CompositionName="CompileUnits">
        <AttributeList>
          <NetworkSource><FlgNet xmlns="http://www.siemens.com/automation/Openness/SW/NetworkSource/FlgNet/v5">
  <Parts>
    <Access Scope="LocalVariable" UId="21"><Symbol><Component Name="Alarm Bit" /></Symbol></Access>
    <Access Scope="LocalVariable" UId="22"><Symbol><Component Name="Return" /></Symbol></Access>
    <Access Scope="LocalVariable" UId="23"><Symbol><Component Name="Current Time" /></Symbol></Access>
    <Part Name="Contact" UId="24" />
    <Part Name="RD_SYS_T" Version="1.0" UId="25" />
  </Parts>
  <Wires>
    <Wire UId="26"><Powerrail /><NameCon UId="24" Name="in" /></Wire>
    <Wire UId="27"><IdentCon UId="21" /><NameCon UId="24" Name="operand" /></Wire>
    <Wire UId="28"><NameCon UId="24" Name="out" /><NameCon UId="25" Name="en" /></Wire>
    <Wire UId="29"><NameCon UId="25" Name="RET_VAL" /><IdentCon UId="22" /></Wire>
    <Wire UId="30"><NameCon UId="25" Name="OUT" /><IdentCon UId="23" /></Wire>
  </Wires>
</FlgNet></NetworkSource>
          <ProgrammingLanguage>LAD</ProgrammingLanguage>
        </AttributeList>
      </SW.Blocks.CompileUnit>
      <SW.Blocks.CompileUnit ID="8" CompositionName="CompileUnits">
        <AttributeList>
          <NetworkSource><FlgNet xmlns="http://www.siemens.com/automation/Openness/SW/NetworkSource/FlgNet/v5">
  <Parts>
    <Access Scope="LocalVariable" UId="21"><Symbol><Component Name="Alarm Bit" /></Symbol></Access>
    <Access Scope="LocalVariable" UId="22"><Symbol><Component Name="Current Time" /></Symbol></Access>
    <Access Scope="LocalVariable" UId="23"><Symbol><Component Name="Boiler_Error" /></Symbol></Access>
    <Access Scope="LocalVariable" UId="24"><Symbol><Component Name="Boiler_Status" /></Symbol></Access>
    <Part Name="Program_Alarm" Version="1.0" UId="25">
      <Instance Scope="LocalVariable" UId="26"><Component Name="Boiler" /></Instance>
    </Part>
  </Parts>
  <Wires>
    <Wire UId="37"><Powerrail /><NameCon UId="25" Name="en" /></Wire>
    <Wire UId="38"><IdentCon UId="21" /><NameCon UId="25" Name="SIG" /></Wire>
    <Wire UId="39"><IdentCon UId="22" /><NameCon UId="25" Name="TIMESTAMP" /></Wire>
    <Wire UId="50"><NameCon UId="25" Name="Error" /><IdentCon UId="23" /></Wire>
    <Wire UId="51"><NameCon UId="25" Name="Status" /><IdentCon UId="24" /></Wire>
  </Wires>
</FlgNet></NetworkSource>
        </AttributeList>
      </SW.Blocks.CompileUnit>
    </ObjectList>
  </SW.Blocks.FB>
</Document>`;

const SVG_NS = "http://www.w3.org/2000/svg";

// --- Drawing Helpers (createWire, createContact, createCoil, createBlock) ---
// These functions are the same as the previous correct version.
// For brevity, they are not repeated here, but they are included in the actual file.

function createText(x, y, text, anchor, cssClass, style = {}) {
    const textEl = document.createElementNS(SVG_NS, "text");
    textEl.setAttribute("x", x);
    textEl.setAttribute("y", y);
    textEl.setAttribute("text-anchor", anchor);
    textEl.setAttribute("dominant-baseline", "middle");
    textEl.classList.add(cssClass);
    textEl.textContent = text;
    Object.assign(textEl.style, { fontFamily: "var(--font-family)", fontSize: "12px", ...style });
    return textEl;
}

function createWire(svg, x1, y1, x2, y2) {
    const line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", String(x1));
    line.setAttribute("y1", String(y1));
    line.setAttribute("x2", String(x2));
    line.setAttribute("y2", String(y2));
    line.style.stroke = "var(--wire-color)";
    line.style.strokeWidth = "var(--wire-thickness)";
    svg.appendChild(line);
}

function createContact(svg, cx, cy, operand) {
    const group = document.createElementNS(SVG_NS, "g");
    const style = { stroke: "var(--wire-color)", strokeWidth: "var(--wire-thickness)" };
    const bar1 = document.createElementNS(SVG_NS, "line");
    bar1.setAttribute("x1", cx - 5); bar1.setAttribute("y1", cy - 10);
    bar1.setAttribute("x2", cx - 5); bar1.setAttribute("y2", cy + 10);
    Object.assign(bar1.style, style);
    group.appendChild(bar1);
    const bar2 = document.createElementNS(SVG_NS, "line");
    bar2.setAttribute("x1", cx + 5); bar2.setAttribute("y1", cy - 10);
    bar2.setAttribute("x2", cx + 5); bar2.setAttribute("y2", cy + 10);
    Object.assign(bar2.style, style);
    group.appendChild(bar2);
    const text = createText(cx, cy - 18, operand, 'middle', 'operand-text');
    group.appendChild(text);
    svg.appendChild(group);
}

function createCoil(svg, cx, cy, operand) {
    const group = document.createElementNS(SVG_NS, "g");
    const style = { stroke: "var(--wire-color)", strokeWidth: "var(--wire-thickness)", fill: "none" };
    const arc1 = document.createElementNS(SVG_NS, "path");
    arc1.setAttribute("d", `M ${cx - 8} ${cy - 10} C ${cx - 2} ${cy - 10}, ${cx - 2} ${cy + 10}, ${cx - 8} ${cy + 10}`);
    const arc2 = document.createElementNS(SVG_NS, "path");
    arc2.setAttribute("d", `M ${cx + 8} ${cy - 10} C ${cx + 2} ${cy - 10}, ${cx + 2} ${cy + 10}, ${cx + 8} ${cy + 10}`);
    Object.assign(arc1.style, style);
    Object.assign(arc2.style, style);
    group.appendChild(arc1);
    group.appendChild(arc2);
    const text = createText(cx, cy - 18, operand, 'middle', 'operand-text');
    group.appendChild(text);
    svg.appendChild(group);
}

function createBlock(svg, x, y, width, height, title, pins) {
    const group = document.createElementNS(SVG_NS, "g");
    const headerHeight = 22;
    const pin_h_padding = 25;
    const pin_v_spacing = 25;

    const body = document.createElementNS(SVG_NS, "rect");
    body.setAttribute("x", x); body.setAttribute("y", y);
    body.setAttribute("width", width); body.setAttribute("height", height);
    body.setAttribute("rx", 3);
    Object.assign(body.style, { fill: "#DCEAF6", stroke: "var(--tia-blue)", strokeWidth: "1.5px" });
    group.appendChild(body);
    const header = document.createElementNS(SVG_NS, "rect");
    header.setAttribute("x", x); header.setAttribute("y", y);
    header.setAttribute("width", width); header.setAttribute("height", headerHeight);
    header.style.fill = "var(--tia-blue)";
    group.appendChild(header);
    const titleText = createText(x + width / 2, y + headerHeight / 2, title, 'middle', 'block-title', { fill: "white", fontWeight: "600", fontSize: "13px" });
    group.appendChild(titleText);
    const enY = y + headerHeight;
    createWire(svg, x - pin_h_padding, enY, x, enY);
    createWire(svg, x + width, enY, x + width + pin_h_padding, enY);
    let leftPinY = enY + pin_v_spacing;
    pins.forEach(pin => {
        if (pin.side !== 'left') return;
        const pinName = createText(x + 5, leftPinY, pin.name, 'start', 'pin-name', { fill: "var(--tia-gray)" });
        group.appendChild(pinName);
        const operandText = createText(x - pin_h_padding, leftPinY, pin.operand, 'end', 'operand-text');
        group.appendChild(operandText);
        createWire(svg, x - pin_h_padding, leftPinY, x, leftPinY);
        leftPinY += pin_v_spacing;
    });
    let rightPinY = enY + pin_v_spacing;
    pins.forEach(pin => {
        if (pin.side !== 'right') return;
        const pinName = createText(x + width - 5, rightPinY, pin.name, 'end', 'pin-name', { fill: "var(--tia-gray)" });
        group.appendChild(pinName);
        const operandText = createText(x + width + pin_h_padding, rightPinY, pin.operand, 'start', 'operand-text');
        group.appendChild(operandText);
        createWire(svg, x + width, rightPinY, x + width + pin_h_padding, rightPinY);
        rightPinY += pin_v_spacing;
    });
    svg.appendChild(group);
}


// --- Main Processing Logic ---
function processAndRender(xmlString) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlString, "application/xml");
    const interfaceTags = new Set();

    // Render Interface and collect tags
    const interfaceRoot = xmlDoc.querySelector("Interface");
    const tbody = document.querySelector("#interface-table tbody");
    tbody.innerHTML = '';
    interfaceRoot.querySelectorAll("Section").forEach(section => {
        const sectionName = section.getAttribute("Name");
        const members = section.querySelectorAll("Member");
        if (members.length > 0) {
            const headerRow = tbody.insertRow();
            const headerCell = headerRow.insertCell();
            headerCell.colSpan = 3;
            headerCell.className = 'section-header';
            headerCell.textContent = sectionName;
            members.forEach(member => {
                const memberName = member.getAttribute("Name");
                interfaceTags.add(memberName);
                const row = tbody.insertRow();
                row.insertCell().textContent = memberName;
                row.insertCell().innerHTML = `<span class="datatype">${member.getAttribute("Datatype")}</span>`;
                const commentEl = member.querySelector("Comment MultiLanguageText");
                row.insertCell().innerHTML = `<span class="comment">${commentEl ? '// ' + commentEl.textContent : ''}</span>`;
            });
        }
    });

    // Render Networks
    const networksContainer = document.querySelector('.networks-container');
    networksContainer.innerHTML = ''; // Clear existing
    xmlDoc.querySelectorAll("SW\\.Blocks\\.CompileUnit").forEach((networkXml, index) => {
        const networkDiv = document.createElement('div');
        networkDiv.className = 'network';

        const title = `Network ${index + 1}`;
        const titleDiv = document.createElement('div');
        titleDiv.className = 'network-title';
        titleDiv.textContent = title;
        networkDiv.appendChild(titleDiv);

        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute('width', '800');
        svg.setAttribute('height', '250'); // Adjust height dynamically later if needed
        svg.classList.add('svg-canvas');
        networkDiv.appendChild(svg);
        networksContainer.appendChild(networkDiv);

        renderNetwork(svg, networkXml, interfaceTags);
    });
}

function getOperand(wire, accesses, interfaceTags) {
    if (!wire) return '???';
    const identCon = wire.querySelector('IdentCon');
    if (!identCon) return '???';

    const access = accesses.find(a => a.getAttribute('UId') === identCon.getAttribute('UId'));
    if (access) {
        const tagName = access.querySelector('Component').getAttribute('Name');
        return interfaceTags.has(tagName) ? `#"${tagName}"` : `"${tagName}"`;
    }
    return '???';
}

function renderNetwork(svg, networkXml, interfaceTags) {
    const RUNG_Y = 100; // Increased RUNG_Y to give more vertical space
    const LEFT_RAIL_X = 30;
    const RIGHT_RAIL_X = 770;

    createWire(svg, LEFT_RAIL_X, 20, LEFT_RAIL_X, RUNG_Y + 100);
    createWire(svg, RIGHT_RAIL_X, 20, RIGHT_RAIL_X, RUNG_Y + 100);

    const parts = Array.from(networkXml.querySelectorAll("Part"));
    const accesses = Array.from(networkXml.querySelectorAll("Access"));
    const wires = Array.from(networkXml.querySelectorAll("Wire"));

    let currentX = LEFT_RAIL_X;
    createWire(svg, currentX, RUNG_Y, currentX + 60, RUNG_Y);
    currentX += 60;

    if (parts.length === 0) {
        createWire(svg, LEFT_RAIL_X, RUNG_Y, RIGHT_RAIL_X, RUNG_Y);
        return;
    }

    parts.forEach(part => {
        const partUid = part.getAttribute("UId");
        const partName = part.getAttribute("Name");

        if (partName === 'Contact') {
            const operandWire = wires.find(w => w.querySelector(`NameCon[UId="${partUid}"][Name="operand"]`));
            const operand = getOperand(operandWire, accesses, interfaceTags);
            createContact(svg, currentX, RUNG_Y, operand);
            createWire(svg, currentX - 10, RUNG_Y, currentX - 5, RUNG_Y);
            currentX += 10;
            createWire(svg, currentX, RUNG_Y, currentX + 20, RUNG_Y);
            currentX += 20;

        } else if (partName === 'RD_SYS_T' || partName === 'Program_Alarm') {
            const blockPins = [];
            const blockWires = wires.filter(w => w.querySelector(`NameCon[UId="${partUid}"]`));

            const INPUT_PINS = ['en', 'SIG', 'TIMESTAMP', 'IN', 'IN1', 'IN2'];

            blockWires.forEach(w => {
                const nameCon = w.querySelector(`NameCon[UId="${partUid}"]`);
                const pinName = nameCon.getAttribute("Name");
                if (pinName === 'en' || pinName === 'eno') return; // Skip EN/ENO, handled by main rung
                const operand = getOperand(w, accesses, interfaceTags);
                const side = INPUT_PINS.includes(pinName) ? 'left' : 'right';
                blockPins.push({ name: pinName, operand: operand, side: side });
            });

            const blockX = currentX + 20;
            const blockWidth = 150;
            const leftPins = blockPins.filter(p => p.side === 'left').length;
            const rightPins = blockPins.filter(p => p.side === 'right').length;
            const blockHeight = 40 + (Math.max(leftPins, rightPins) * 25);
            const blockY = RUNG_Y - (blockHeight / 2);
            const enPinY = blockY + 22;

            createWire(svg, currentX, RUNG_Y, blockX, RUNG_Y);
            createWire(svg, blockX, RUNG_Y, blockX, enPinY);

            createBlock(svg, blockX, blockY, blockWidth, blockHeight, partName, blockPins);

            const enoPinX = blockX + blockWidth;
            createWire(svg, enoPinX, enPinY, enoPinX, RUNG_Y);
            createWire(svg, enoPinX, RUNG_Y, RIGHT_RAIL_X, RUNG_Y);
        }
    });
}


document.addEventListener('DOMContentLoaded', () => {
    processAndRender(boilerAlarmXml);
});
</script>
</body>
</html>
