<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIA Portal Ladder Logic Viewer</title>
    <style>
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            color: #333;
        }
        h1 {
            font-size: 1.5em;
            color: #003366;
            border-bottom: 2px solid #003366;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #interface-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        #interface-container th, #interface-container td {
            border: 1px solid #d0d0d0;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        #interface-container th {
            background-color: #e0e0e0;
            font-weight: 600;
        }
        #interface-container .section-header td {
            background-color: #f7f7f7;
            font-weight: bold;
            color: #003366;
        }
        .network {
            border: 1px solid #d0d0d0;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #ffffff;
            border-radius: 4px;
        }
        .network-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }
        .network-comment {
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }
        .power-rail {
            stroke: black;
            stroke-width: 2;
        }
        .wire {
            stroke: #000080;
            stroke-width: 1.5;
            fill: none;
        }
        .label, .param-label {
            font-family: "Segoe UI", sans-serif;
            font-size: 12px;
            fill: #000;
        }
        .var-label {
            font-family: "Consolas", "Menlo", "Courier New", monospace;
            font-size: 13px;
            fill: #000;
            font-style: italic;
        }
        .instr-block {
            stroke: #41729f;
            stroke-width: 1;
            fill: #d4e1f5;
        }
        .instr-header {
            fill: #41729f;
        }
        .instr-name {
            font-family: "Segoe UI", sans-serif;
            font-size: 14px;
            font-weight: bold;
            fill: white;
            text-anchor: middle;
        }
        .coil {
            stroke: #000080;
            stroke-width: 1.5;
            fill: none;
        }
    </style>
</head>
<body>
    <h1>TIA Portal Ladder Logic Viewer</h1>
    <div class="container">
        <h2>Block Interface</h2>
        <div id="interface-container"></div>
    </div>
    <div class="container">
        <h2>Networks</h2>
        <div id="networks-container"></div>
    </div>
    <script>
        const xmlData = `<?xml version="1.0" encoding="utf-8"?>
<Document>
  <Engineering version="V19" />
  <SW.Blocks.OB ID="0">
    <AttributeList>
      <Interface>
        <Sections xmlns="http://www.siemens.com/automation/Openness/SW/Interface/v5">
          <Section Name="Input">
            <Member Name="Initial_Call" Datatype="Bool" Informative="true">
              <Comment>
                <MultiLanguageText Lang="en-US">Initial call of this OB</MultiLanguageText>
              </Comment>
            </Member>
            <Member Name="Remanence" Datatype="Bool" Informative="true">
              <Comment>
                <MultiLanguageText Lang="en-US">=True, if remanent data are available</MultiLanguageText>
              </Comment>
            </Member>
          </Section>
          <Section Name="Temp" />
          <Section Name="Constant" />
        </Sections>
      </Interface>
      <MemoryLayout>Optimized</MemoryLayout>
      <Name>Main</Name>
      <Namespace />
      <Number>1</Number>
      <ProgrammingLanguage>LAD</ProgrammingLanguage>
      <SecondaryType>ProgramCycle</SecondaryType>
      <SetENOAutomatically>false</SetENOAutomatically>
    </AttributeList>
    <ObjectList>
      <SW.Blocks.CompileUnit ID="21" CompositionName="CompileUnits">
        <AttributeList>
          <NetworkSource><FlgNet xmlns="http://www.siemens.com/automation/Openness/SW/NetworkSource/FlgNet/v5">
            <Parts>
              <Access Scope="GlobalVariable" UId="21"><Symbol><Component Name="POT2_Lower_1500" /></Symbol></Access>
              <Access Scope="LiteralConstant" UId="22"><Constant><ConstantType>Int</ConstantType><ConstantValue>30000</ConstantValue></Constant></Access>
              <Access Scope="GlobalVariable" UId="23"><Symbol><Component Name="POT2_Warning" /></Symbol></Access>
              <Part Name="Gt" UId="24"><TemplateValue Name="SrcType" Type="Type">Int</TemplateValue></Part>
              <Part Name="Coil" UId="25" />
            </Parts>
            <Wires>
              <Wire UId="26"><Powerrail /><NameCon UId="24" Name="pre" /></Wire>
              <Wire UId="27"><IdentCon UId="21" /><NameCon UId="24" Name="in1" /></Wire>
              <Wire UId="28"><IdentCon UId="22" /><NameCon UId="24" Name="in2" /></Wire>
              <Wire UId="29"><NameCon UId="24" Name="out" /><NameCon UId="25" Name="in" /></Wire>
              <Wire UId="30"><IdentCon UId="23" /><NameCon UId="25" Name="operand" /></Wire>
            </Wires>
          </FlgNet></NetworkSource>
          <ProgrammingLanguage>LAD</ProgrammingLanguage>
        </AttributeList>
        <ObjectList>
          <MultilingualText ID="24" CompositionName="Title"><ObjectList><MultilingualTextItem ID="25" CompositionName="Items"><AttributeList><Culture>en-US</Culture><Text>ProDiag example</Text></AttributeList></MultilingualTextItem></ObjectList></MultilingualText>
        </ObjectList>
      </SW.Blocks.CompileUnit>
    </ObjectList>
  </SW.Blocks.OB>
</Document>`;

        document.addEventListener('DOMContentLoaded', () => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlData, 'application/xml');

            // Check for parsing errors
            const parserError = xmlDoc.querySelector('parsererror');
            if (parserError) {
                console.error("XML Parsing Error:", parserError.textContent);
                return;
            }

            renderInterface(xmlDoc);
            renderNetworks(xmlDoc);
        });

        function renderInterface(xmlDoc) {
            const interfaceContainer = document.getElementById('interface-container');
            const sections = xmlDoc.querySelectorAll('Interface > Sections > Section');
            let html = '<table>';
            html += '<tr><th>Scope</th><th>Name</th><th>Data Type</th></tr>';
            sections.forEach(section => {
                const sectionName = section.getAttribute('Name');
                const members = section.querySelectorAll('Member');
                html += `<tr class="section-header"><td colspan="3">${sectionName}</td></tr>`;
                if (members.length > 0) {
                    members.forEach(member => {
                        const memberName = member.getAttribute('Name');
                        const memberType = member.getAttribute('Datatype');
                        html += `<tr><td></td><td>${memberName}</td><td>${memberType}</td></tr>`;
                    });
                }
            });
            html += '</table>';
            interfaceContainer.innerHTML = html;
        }

        function renderNetworks(xmlDoc) {
            const networksContainer = document.getElementById('networks-container');
            const compileUnits = xmlDoc.querySelectorAll('SW\\.Blocks\\.CompileUnit');

            compileUnits.forEach((unit, i) => {
                const networkSource = unit.querySelector('NetworkSource > FlgNet');
                if (!networkSource) return;

                const titleElement = unit.querySelector('MultilingualText[CompositionName="Title"] Text');
                const title = titleElement ? titleElement.textContent.trim() : `Network ${i + 1}`;

                const networkWrapper = document.createElement('div');
                networkWrapper.className = 'network';
                const networkTitleDiv = document.createElement('div');
                networkTitleDiv.className = 'network-title';
                networkTitleDiv.textContent = title;
                networkWrapper.appendChild(networkTitleDiv);

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', '800');
                svg.setAttribute('height', '200');
                networkWrapper.appendChild(svg);

                renderSampleNetwork(svg, networkSource);
                networksContainer.appendChild(networkWrapper);
            });
        }

        function renderSampleNetwork(svg, networkSource) {
            const getCoords = (col, row) => ({ x: col * 100 + 80, y: row * 80 + 50 });

            const railY2 = 150;
            svg.appendChild(createSvgElement('line', { x1: 20, y1: 20, x2: 20, y2: railY2, class: 'power-rail' }));
            svg.appendChild(createSvgElement('line', { x1: 780, y1: 20, x2: 780, y2: railY2, class: 'power-rail' }));

            const blockCoords = getCoords(2, 0.5);
            svg.appendChild(createBlock(blockCoords.x, blockCoords.y, 'Gt', [{name: 'in1'}, {name: 'in2'}], [{name: 'out'}]));

            const coilCoords = getCoords(5, 0.5);
            svg.appendChild(createCoil(coilCoords.x, coilCoords.y, 'POT2_Warning'));

            const in1_y = blockCoords.y - 10;
            const in2_y = blockCoords.y + 40;
            svg.appendChild(createWire(20, in1_y, blockCoords.x, in1_y));
            svg.appendChild(createLabel(blockCoords.x - 120, in1_y + 5, 'POT2_Lower_1500', 'var-label'));
            svg.appendChild(createWire(20, in2_y, blockCoords.x, in2_y));
            svg.appendChild(createLabel(blockCoords.x - 80, in2_y + 5, '30000', 'var-label'));

            const out_y = blockCoords.y + 15;
            svg.appendChild(createWire(blockCoords.x + 100, out_y, coilCoords.x - 25, out_y));
            svg.appendChild(createWire(coilCoords.x + 25, out_y, 780, out_y));
        }

        function createSvgElement(tag, attrs) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            for (let k in attrs) el.setAttribute(k, attrs[k]);
            return el;
        }

        function createWire(x1, y1, x2, y2) {
            return createSvgElement('line', { x1, y1, x2, y2, class: 'wire' });
        }

        function createLabel(x, y, text, className = 'label') {
            const label = createSvgElement('text', { x, y, class: className });
            label.textContent = text;
            return label;
        }

        function createCoil(x, y, variableName) {
            const group = createSvgElement('g');
            group.appendChild(createLabel(x - 20, y - 15, variableName, 'var-label'));
            const path = `M ${x-25} ${y} C ${x-15} ${y-20}, ${x+15} ${y-20}, ${x+25} ${y} C ${x+15} ${y+20}, ${x-15} ${y+20}, ${x-25} ${y}`;
            group.appendChild(createSvgElement('path', { d: path, class: 'coil' }));
            return group;
        }

        function createBlock(x, y, name, inputs, outputs) {
            const width = 100;
            const headerHeight = 20;
            const bodyHeight = (Math.max(inputs.length, outputs.length)) * 25 + 10;
            const height = headerHeight + bodyHeight;
            const group = createSvgElement('g');
            group.setAttribute('transform', `translate(${x}, ${y})`);
            group.appendChild(createSvgElement('rect', { x: 0, y: -height/2, width, height, class: 'instr-block' }));
            group.appendChild(createSvgElement('rect', { x: 0, y: -height/2, width, headerHeight, class: 'instr-header' }));
            const blockName = createLabel(width / 2, -height/2 + 15, name, 'instr-name');
            group.appendChild(blockName);
            inputs.forEach((input, i) => {
                const pinY = (-height/2) + headerHeight + 15 + (i * 25);
                group.appendChild(createSvgElement('line', { x1: -5, y1: pinY, x2: 0, y2: pinY, class: 'wire' }));
                const label = createLabel(-10, pinY + 4, input.name, 'param-label');
                label.setAttribute('text-anchor', 'end');
                group.appendChild(label);
            });
            outputs.forEach((output, i) => {
                const pinY = (-height/2) + headerHeight + 15 + (i * 25);
                group.appendChild(createSvgElement('line', { x1: width, y1: pinY, x2: width + 5, y2: pinY, class: 'wire' }));
                const label = createLabel(width + 10, pinY + 4, output.name, 'param-label');
                label.setAttribute('text-anchor', 'start');
                group.appendChild(label);
            });
            return group;
        }
    </script>
</body>
</html>
