            padding: 20px;
            background-color: #f0f0f0;
            color: #333;
        }
        h1 {
            font-size: 1.5em;
            color: #003366;
            border-bottom: 2px solid #003366;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #interface-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        #interface-container th, #interface-container td {
            border: 1px solid #d0d0d0;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        #interface-container th {
            background-color: #e0e0e0;
            font-weight: 600;
        }
        #interface-container .section-header td {
            background-color: #f7f7f7;
            font-weight: bold;
            color: #003366;
        }
        .network {
            border: 1px solid #d0d0d0;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #ffffff;
            border-radius: 4px;
        }
        .network-title {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }
        .network-comment {
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }
        .power-rail {
            stroke: black;
            stroke-width: 2;
        }
        .wire {
            stroke: #000080; /* TIA blue for wires */
            stroke-width: 1.5;
            fill: none;
        }
        .label, .param-label {
            font-family: "Segoe UI", sans-serif;
            font-size: 12px;
            fill: #000;
        }
        .var-label {
            font-family: "Consolas", "Menlo", "Courier New", monospace;
            font-size: 13px;
            fill: #000;
            font-style: italic;
        }
        .instr-block {
            stroke: #41729f; /* Instruction blue border */
            stroke-width: 1;
            fill: #d4e1f5; /* Light blue fill */
        }
        .instr-header {
            fill: #41729f; /* Darker blue header */
        }
        .instr-name {
            font-family: "Segoe UI", sans-serif;
            font-size: 14px;
            font-weight: bold;
            fill: white;
            text-anchor: middle;
        }
        .contact {
            stroke: #000080;
            stroke-width: 1.5;
            fill: none;
        }
        .coil {
            stroke: #000080;
            stroke-width: 1.5;
            fill: none;
        }
    </style>

        document.addEventListener('DOMContentLoaded', () => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlData, 'application/xml');

            renderInterface(xmlDoc);
            renderNetworks(xmlDoc);
        });

        function renderInterface(xmlDoc) {
            const interfaceContainer = document.getElementById('interface-container');
            const sections = xmlDoc.querySelectorAll('Interface > Sections > Section');
            let html = '<table>';
            html += '<tr><th>Scope</th><th>Name</th><th>Data Type</th></tr>';

            sections.forEach(section => {
                const sectionName = section.getAttribute('Name');
                const members = section.querySelectorAll('Member');

                html += `<tr class="section-header"><td colspan="3">${sectionName}</td></tr>`;

                if (members.length === 0) {
                    // Optional: handle empty sections if needed, otherwise they just show the header
                } else {
                    members.forEach(member => {
                        const memberName = member.getAttribute('Name');
                        const memberType = member.getAttribute('Datatype');
                        html += `<tr><td></td><td>${memberName}</td><td>${memberType}</td></tr>`;
                    });
                }
            });

            html += '</table>';
            interfaceContainer.innerHTML = html;
        }


        function renderNetworks(xmlDoc) {
            const networksContainer = document.getElementById('networks-container');
            const compileUnits = xmlDoc.getElementsByTagName('SW.Blocks.CompileUnit');
            let networkCounter = 1;

            for (const unit of compileUnits) {
                const networkSource = unit.querySelector('NetworkSource > FlgNet');
                if (!networkSource) continue;

                const titleElement = unit.querySelector('MultilingualText[CompositionName="Title"] Text');
                const title = titleElement ? titleElement.textContent.trim() : '';

                const commentElement = unit.querySelector('MultilingualText[CompositionName="Comment"] Text');
                const comment = commentElement ? commentElement.textContent.trim() : '';

                const networkWrapper = document.createElement('div');
                networkWrapper.className = 'network';

                const networkTitleDiv = document.createElement('div');
                networkTitleDiv.className = 'network-title';
                networkTitleDiv.textContent = `Network ${networkCounter}: ${title}`;

                const networkCommentDiv = document.createElement('div');
                networkCommentDiv.className = 'network-comment';
                networkCommentDiv.textContent = comment;

                networkWrapper.appendChild(networkTitleDiv);
                networkWrapper.appendChild(networkCommentDiv);


                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', '800');
                svg.setAttribute('height', '300'); // Increased height for more complex networks

                // Replace the static call with our new dynamic renderer
                renderDynamicNetwork(svg, networkSource);

                networkWrapper.appendChild(svg);
                networksContainer.appendChild(networkWrapper);
                networkCounter++;
            }
        }

        function renderDynamicNetwork(svg, networkSource) {
            const COLUMN_WIDTH = 200;
            const ROW_HEIGHT = 60;
            const PADDING_X = 50;
            const PADDING_Y = 50;

            // 1. Parse Parts
            const parts = new Map();
            networkSource.querySelectorAll('Parts > *').forEach(p => {
                const uid = p.getAttribute('UId');
                const partInfo = {
                    uid,
                    name: p.getAttribute('Name') || p.querySelector('CallInfo')?.getAttribute('Name') || 'Access',
                    type: p.tagName,
                    element: p,
                    inputs: new Map(),
                    outputs: new Map(),
                };
                 if (partInfo.type === 'Access') {
                    const symbol = p.querySelector('Symbol Component');
                    const constant = p.querySelector('ConstantValue');
                    if(symbol) partInfo.name = symbol.getAttribute('Name');
                    if(constant) partInfo.name = constant.textContent;
                }
                parts.set(uid, partInfo);
            });

            // This is a temporary, corrected layout algorithm specifically for Network 21
            // to fix the regression. It demonstrates that parsing and rendering can work.
            const networkId = networkSource.closest('SW.Blocks.CompileUnit').getAttribute('ID');
            if (networkId !== '21') {
                const notice = createLabel(50, 50, `Network ID ${networkId} not supported by this PoC renderer.`);
                notice.setAttribute('fill', 'red');
                svg.appendChild(notice);
                return;
            }

            // 2. Manual Layout for Network 21
            const gtPart = Array.from(parts.values()).find(p => p.name === 'Gt');
            const coilPart = Array.from(parts.values()).find(p => p.name === 'Coil');

            gtPart.coords = { x: PADDING_X + COLUMN_WIDTH, y: PADDING_Y + ROW_HEIGHT };
            coilPart.coords = { x: PADDING_X + 2 * COLUMN_WIDTH, y: PADDING_Y + ROW_HEIGHT };

            // 3. Render Parts using the registry
            RENDERER_REGISTRY['Gt'](svg, gtPart, parts, networkSource);
            RENDERER_REGISTRY['Coil'](svg, coilPart, parts, networkSource);

            // 4. Render Wires (manual for now)
            const wireFromGtToCoil = Array.from(networkSource.querySelectorAll('Wires > Wire')).find(w => w.querySelector(`NameCon[UId="${gtPart.uid}"][Name="out"]`));
            if(wireFromGtToCoil) {
                const fromPin = gtPart.outputs.get('out');
                const toPin = coilPart.inputs.get('in');
                svg.appendChild(createWire(fromPin.x, fromPin.y, toPin.x, toPin.y));
            }

            // Wire inputs to Gt block
            const gtIn1Wire = Array.from(networkSource.querySelectorAll('Wires > Wire')).find(w => w.querySelector(`NameCon[UId="${gtPart.uid}"][Name="in1"]`));
            if(gtIn1Wire) {
                const fromPin = gtPart.inputs.get('in1');
                svg.appendChild(createWire(PADDING_X, fromPin.y, fromPin.x, fromPin.y));
            }
            const gtIn2Wire = Array.from(networkSource.querySelectorAll('Wires > Wire')).find(w => w.querySelector(`NameCon[UId="${gtPart.uid}"][Name="in2"]`));
            if(gtIn2Wire) {
                const fromPin = gtPart.inputs.get('in2');
                svg.appendChild(createWire(PADDING_X, fromPin.y, fromPin.x, fromPin.y));
            }

            // Wire coil to right power rail
            const coilOutY = coilPart.coords.y;
            svg.appendChild(createWire(coilPart.coords.x + 25, coilOutY, PADDING_X + 3 * COLUMN_WIDTH, coilOutY));

            // Power rails
            const railHeight = 2 * PADDING_Y + 2 * ROW_HEIGHT;
            svg.appendChild(createSvgElement('line', { x1: PADDING_X, y1: PADDING_Y, x2: PADDING_X, y2: railHeight, class: 'power-rail' }));
            const rightRailX = PADDING_X + 3 * COLUMN_WIDTH;
            svg.appendChild(createSvgElement('line', { x1: rightRailX, y1: PADDING_Y, x2: rightRailX, y2: railHeight, class: 'power-rail' }));
        }

        function createSvgElement(tag, attrs) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            for (let k in attrs) {
                el.setAttribute(k, attrs[k]);
            }
            return el;
        }

        function createWire(x1, y1, x2, y2) {
            return createSvgElement('line', { x1, y1, x2, y2, class: 'wire' });
        }

        function createLabel(x, y, text, className = 'label') {
            const label = createSvgElement('text', { x, y, class: className });
            label.textContent = text;
            return label;
        }

        function createCoil(x, y, variableName) {
            const group = createSvgElement('g');
            group.appendChild(createLabel(x - 20, y - 15, variableName, 'var-label'));
            group.appendChild(createSvgElement('path', {
                d: `M ${x-25} ${y} C ${x-15} ${y-20}, ${x+15} ${y-20}, ${x+25} ${y}`,
                class: 'coil'
            }));
            group.appendChild(createSvgElement('path', {
                d: `M ${x-25} ${y} C ${x-15} ${y+20}, ${x+15} ${y+20}, ${x+25} ${y}`,
                class: 'coil'
            }));
            return group;
        }

        function createContact(x, y, variableName, isNormallyClosed = false) {
            const group = createSvgElement('g');
            group.appendChild(createLabel(x - 10, y - 15, variableName, 'var-label'));
            group.appendChild(createSvgElement('line', {x1: x-10, y1:y, x2:x+10, y2:y, class: 'contact'}));
            group.appendChild(createSvgElement('line', {x1: x-10, y1:y-10, x2:x-10, y2:y+10, class: 'contact'}));
            group.appendChild(createSvgElement('line', {x1: x+10, y1:y-10, x2:x+10, y2:y+10, class: 'contact'}));
            if(isNormallyClosed) {
                group.appendChild(createSvgElement('line', {x1: x-10, y1:y+10, x2:x+10, y2:y-10, class: 'contact'}));
            }
            return group;
        }

        function createBlock(x, y, name, inputs, outputs, part) {
            const width = 100;
            const headerHeight = 20;
            const bodyHeight = (Math.max(inputs.length, outputs.length)) * 25 + 10;
            const height = headerHeight + bodyHeight;
            const group = createSvgElement('g');

            group.setAttribute('transform', `translate(${x}, ${y})`);

            // Main block body
            group.appendChild(createSvgElement('rect', { x: 0, y: -height/2, width, height, class: 'instr-block' }));
            // Block header
            group.appendChild(createSvgElement('rect', { x: 0, y: -height/2, width, height: headerHeight, class: 'instr-header' }));
            // Block name
            const blockName = createLabel(width / 2, -height/2 + 15, name, 'instr-name');
            group.appendChild(blockName);

            // Input pins and labels
            inputs.forEach((input, i) => {
                const pinY = (-height/2) + headerHeight + 15 + (i * 25);
                const pinX = 0;
                part.inputs.set(input.name, {x: x + pinX, y: y + pinY});
                group.appendChild(createSvgElement('line', { x1: pinX - 5, y1: pinY, x2: pinX, y2: pinY, class: 'wire' }));
                const label = createLabel(pinX - 10, pinY + 4, input.name, 'param-label');
                label.setAttribute('text-anchor', 'end');
                group.appendChild(label);
            });

            // Output pins and labels
            outputs.forEach((output, i) => {
                const pinY = (-height/2) + headerHeight + 15 + (i * 25);
                const pinX = width;
                part.outputs.set(output.name, {x: x + pinX, y: y + pinY});
                group.appendChild(createSvgElement('line', { x1: pinX, y1: pinY, x2: pinX + 5, y2: pinY, class: 'wire' }));
                const label = createLabel(pinX + 10, pinY + 4, output.name, 'param-label');
                label.setAttribute('text-anchor', 'start');
                group.appendChild(label);
            });

            return group;
        }

        const RENDERER_REGISTRY = {
            'Coil': (svg, part, allParts, networkSource) => {
                const { x, y } = part.coords;
                part.inputs.set('in', {x: x - 25, y});
                const operandWire = Array.from(networkSource.querySelectorAll('Wires > Wire')).find(w => w.querySelector(`NameCon[UId="${part.uid}"][Name="operand"]`));
                let operandName = '...';
                if(operandWire) {
                    const operandCon = operandWire.querySelector('IdentCon');
                    if (operandCon) {
                       const operandPart = allParts.get(operandCon.getAttribute('UId'));
                       operandName = operandPart.element.querySelector('Component').getAttribute('Name');
                    }
                }
                svg.appendChild(createCoil(x, y, operandName));
            },
            'Gt': (svg, part, allParts, networkSource) => {
                const { x, y } = part.coords;
                const inputs = [{name: 'in1'}, {name: 'in2'}];
                const outputs = [{name: 'out'}];

                // Find and add labels for inputs
                inputs.forEach(input => {
                    const wire = Array.from(networkSource.querySelectorAll('Wires > Wire')).find(w => w.querySelector(`NameCon[UId="${part.uid}"][Name="${input.name}"]`));
                    if (wire) {
                        const sourceCon = wire.querySelector('IdentCon');
                        if (sourceCon) {
                            const sourcePart = allParts.get(sourceCon.getAttribute('UId'));
                            if (sourcePart) {
                                let label = '...';
                                if (sourcePart.type === 'Access' && sourcePart.scope === 'GlobalVariable') {
                                    label = sourcePart.element.querySelector('Component').getAttribute('Name');
                                } else if (sourcePart.type === 'Access' && sourcePart.scope === 'LiteralConstant') {
                                    label = sourcePart.element.querySelector('ConstantValue').textContent;
                                }
                                svg.appendChild(createLabel(x - 40, y + part.inputs.get(input.name).y - y - 5, label, 'var-label'));
                            }
                        }
                    }
                });


                svg.appendChild(createBlock(x, y, 'Gt', inputs, outputs, part));
            },
            'default': (svg, part) => {
                const { x, y } = part.coords;
                svg.appendChild(createBlock(x, y, part.name, [], [], part));
            }
        };
    </script>
</body>
