        });

        function renderInterface(xmlDoc) {
            const interfaceContainer = document.getElementById('interface-container');
            const sections = xmlDoc.getElementsByTagName('Section');
            let html = '<table>';
            html += '<tr><th>Section</th><th>Name</th><th>Data Type</th></tr>';

            for (const section of sections) {
                const sectionName = section.getAttribute('Name');
                const members = section.getElementsByTagName('Member');
                if (members.length === 0) {
                    html += `<tr><td>${sectionName}</td><td>-</td><td>-</td></tr>`;
                } else {
                    for (let i = 0; i < members.length; i++) {
                        const member = members[i];
                        const memberName = member.getAttribute('Name');
                        const memberType = member.getAttribute('Datatype');
                        // Add the section name only for the first member in that section
                        if (i === 0) {
                            html += `<tr><td rowspan="${members.length}">${sectionName}</td><td>${memberName}</td><td>${memberType}</td></tr>`;
                        } else {
                            html += `<tr><td>${memberName}</td><td>${memberType}</td></tr>`;
                        }
                    }
                }
            }

            html += '</table>';
            interfaceContainer.innerHTML = html;
        }

        function renderNetworks(xmlDoc) {
            const networksContainer = document.getElementById('networks-container');
            const compileUnits = xmlDoc.getElementsByTagName('SW.Blocks.CompileUnit');
            let networkCounter = 1;

            for (const unit of compileUnits) {
                const networkSource = unit.querySelector('NetworkSource > FlgNet');
                if (!networkSource) continue;

                const titleElement = unit.querySelector('MultilingualText[CompositionName="Title"] Text');
                const title = titleElement ? titleElement.textContent : 'Network ' + networkCounter;

                const networkWrapper = document.createElement('div');
                networkWrapper.className = 'network';

                const networkTitle = document.createElement('h3');
                networkTitle.textContent = `Network ${networkCounter}: ${title}`;
                networkWrapper.appendChild(networkTitle);

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', '800');
                svg.setAttribute('height', '200'); // Adjust height as needed

                // For this PoC, we will manually render the network with ID 21 as a demonstration
                if (unit.getAttribute('ID') === '21') {
                    renderSampleNetwork(svg, networkSource);
                }

                networkWrapper.appendChild(svg);
                networksContainer.appendChild(networkWrapper);
                networkCounter++;
            }
        }

        function renderSampleNetwork(svg, networkSource) {
            const CELL_WIDTH = 60;
            const CELL_HEIGHT = 40;
            const GRID_COLS = 12;
            const GRID_ROWS = 5;

            const getCoords = (col, row) => ({ x: col * CELL_WIDTH, y: row * CELL_HEIGHT });

            // Draw Power Rails
            const railY2 = (GRID_ROWS - 1) * CELL_HEIGHT;
            svg.appendChild(createSvgElement('line', { x1: 20, y1: 20, x2: 20, y2: railY2, class: 'power-rail' }));
            svg.appendChild(createSvgElement('line', { x1: 750, y1: 20, x2: 750, y2: railY2, class: 'power-rail' }));

            // --- Network Elements (Layout for network ID '21') ---

            // 1. "Gt" Block
            const blockCoords = getCoords(4, 2);
            svg.appendChild(createBlock(blockCoords.x, blockCoords.y, 'Gt',
                [{name: 'in1'}, {name: 'in2'}], // Inputs
                [{name: 'out'}]  // Outputs
            ));

            // 2. Coil
            const coilCoords = getCoords(10, 2);
            svg.appendChild(createCoil(coilCoords.x, coilCoords.y, 'POT2_Warning'));

            // 3. Wires and input labels
            const in1Coords = getCoords(2, 1.5);
            const in2Coords = getCoords(2, 2.5);

            // Wire from power rail to block enable
            const enIn = {x: blockCoords.x, y: blockCoords.y - 20};
            svg.appendChild(createWire(20, enIn.y, enIn.x, enIn.y));
            svg.appendChild(createLabel(enIn.x - 15, enIn.y - 5, 'EN'));


            // Wire from input 1 to block
            svg.appendChild(createWire(20, in1Coords.y, blockCoords.x, in1Coords.y));
            svg.appendChild(createLabel(getCoords(1, 1.5).x, getCoords(1, 1.5).y - 5, 'POT2_Lower_1500'));

            // Wire from input 2 to block
            svg.appendChild(createWire(20, in2Coords.y, blockCoords.x, in2Coords.y));
            svg.appendChild(createLabel(getCoords(1, 2.5).x, getCoords(1, 2.5).y - 5, '30000'));

            // Wire from block out to coil
            const blockOut = { x: blockCoords.x + CELL_WIDTH * 2, y: blockCoords.y};
            svg.appendChild(createWire(blockOut.x, blockOut.y, coilCoords.x, coilCoords.y));

            // Wire from coil to right power rail
            svg.appendChild(createWire(coilCoords.x + 40, coilCoords.y, 750, coilCoords.y));
        }

        function createSvgElement(tag, attrs) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            for (let k in attrs) {
                el.setAttribute(k, attrs[k]);
            }
            return el;
        }

        function createWire(x1, y1, x2, y2) {
            return createSvgElement('line', { x1, y1, x2, y2, class: 'wire' });
        }

        function createLabel(x, y, text) {
            const label = createSvgElement('text', { x, y, class: 'label' });
            label.textContent = text;
            return label;
        }

        function createCoil(x, y, label) {
            const group = createSvgElement('g');
            const coilPath = 'M 0 0 C 20 -20, 20 20, 40 0'; // A simple curve for the coil
            group.appendChild(createSvgElement('path', { d: coilPath, class: 'coil' }));
            group.appendChild(createLabel(0, -15, label));
            group.setAttribute('transform', `translate(${x}, ${y})`);
            return group;
        }

        function createBlock(x, y, name, inputs, outputs) {
            const width = 120;
            const height = (Math.max(inputs.length, outputs.length) + 1) * 20;
            const group = createSvgElement('g');

            // Block rectangle
            group.appendChild(createSvgElement('rect', { x: 0, y: -height/2, width, height, class: 'block' }));

            // Block name
            const blockName = createLabel(width / 2, 0, name);
            blockName.setAttribute('text-anchor', 'middle');
            group.appendChild(blockName);

            // Input pins and labels
            inputs.forEach((input, i) => {
                const pinY = (-height/2) + 20 * (i + 1);
                group.appendChild(createSvgElement('line', { x1: -10, y1: pinY, x2: 0, y2: pinY, class: 'wire' }));
                const label = createLabel(-15, pinY + 5, input.name);
                label.setAttribute('text-anchor', 'end');
                group.appendChild(label);
            });

            // Output pins and labels
            outputs.forEach((output, i) => {
                const pinY = (-height/2) + 20 * (i + 1);
                group.appendChild(createSvgElement('line', { x1: width, y1: pinY, x2: width + 10, y2: pinY, class: 'wire' }));
                const label = createLabel(width + 15, pinY + 5, output.name);
                label.setAttribute('text-anchor', 'start');
                group.appendChild(label);
            });

            group.setAttribute('transform', `translate(${x}, ${y})`);
            return group;
        }
    </script>
</body>
</html>
